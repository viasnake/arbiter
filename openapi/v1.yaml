openapi: 3.1.0
info:
  title: Arbiter API
  version: 1.2.1
servers:
  - url: http://localhost:8080
paths:
  /v1/healthz:
    get:
      summary: Health check
      responses:
        "200":
          description: OK
          content:
            text/plain:
              schema:
                type: string

  /v1/contracts:
    get:
      summary: Contract metadata discovery
      responses:
        "200":
          description: Contracts metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContractsMetadata"

  /v1/operation-requests:
    post:
      summary: Create a run from an operation request
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OperationRequest"
      responses:
        "201":
          description: Run accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OperationRequestAccepted"
        "409":
          description: Duplicate conflict
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /v1/runs/{run_id}:
    get:
      summary: Retrieve run envelope
      parameters:
        - name: run_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Run envelope
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RunEnvelope"
        "404":
          description: Run not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /v1/runs/{run_id}/step-intents:
    post:
      summary: Submit step intent for run evaluation
      parameters:
        - name: run_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StepIntent"
      responses:
        "200":
          description: Evaluated step
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Step"
        "409":
          description: Conflict
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "422":
          description: Invalid transition
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /v1/runs/{run_id}/step-results:
    post:
      summary: Submit execution result
      parameters:
        - name: run_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StepResultSubmission"
      responses:
        "200":
          description: Updated statuses
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StepResultResponse"
        "404":
          description: Run or step not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: Conflict
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "422":
          description: Invalid transition
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "423":
          description: Approval required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /v1/approvals/{approval_id}/grant:
    post:
      summary: Grant approval
      parameters:
        - name: approval_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApprovalActionRequest"
      responses:
        "200":
          description: Approval updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Approval"
        "404":
          description: Approval not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: Conflict
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "422":
          description: Invalid transition
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /v1/approvals/{approval_id}/deny:
    post:
      summary: Deny approval
      parameters:
        - name: approval_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApprovalActionRequest"
      responses:
        "200":
          description: Approval updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Approval"
        "404":
          description: Approval not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: Conflict
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "422":
          description: Invalid transition
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /v1/approvals/{approval_id}/cancel:
    post:
      summary: Cancel approval
      parameters:
        - name: approval_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApprovalActionRequest"
      responses:
        "200":
          description: Approval updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Approval"
        "404":
          description: Approval not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: Conflict
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "422":
          description: Invalid transition
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /v1/audit/runs/{run_id}:
    get:
      summary: List audit events by run
      parameters:
        - name: run_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Audit event list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuditRunEventsResponse"

components:
  schemas:
    ContractsMetadata:
      $ref: "../contracts/v1/ops.contracts_metadata.schema.json"

    OperationRequest:
      type: object
      additionalProperties: false
      required: [request_id, requester, source, objective]
      properties:
        request_id: { type: string, minLength: 1 }
        requester: { type: string, minLength: 1 }
        source: { type: string, minLength: 1 }
        objective: { type: string, minLength: 1 }
        environment_hint: { type: [string, "null"] }
        metadata: { type: object, additionalProperties: true, default: {} }

    OperationRequestAccepted:
      type: object
      additionalProperties: false
      required: [run_id, status, decision_summary, links]
      properties:
        run_id: { type: string }
        status: { $ref: "#/components/schemas/RunStatus" }
        decision_summary: { type: string }
        links:
          type: object
          additionalProperties: { type: string }

    Run:
      type: object
      additionalProperties: false
      required:
        [run_id, request_id, requester, source, objective, environment, status, created_at, updated_at, risk_summary]
      properties:
        run_id: { type: string }
        request_id: { type: string }
        requester: { type: string }
        source: { type: string }
        objective: { type: string }
        environment: { type: string }
        status: { $ref: "#/components/schemas/RunStatus" }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
        risk_summary: { type: object, additionalProperties: true }

    RunEnvelope:
      type: object
      additionalProperties: false
      required: [run, steps, approvals, permits]
      properties:
        run: { $ref: "#/components/schemas/Run" }
        steps:
          type: array
          items: { $ref: "#/components/schemas/Step" }
        approvals:
          type: array
          items: { $ref: "#/components/schemas/Approval" }
        permits:
          type: array
          items: { $ref: "#/components/schemas/ExecutionPermit" }

    StepIntent:
      type: object
      additionalProperties: false
      required: [intent_type, capability, target, risk_level, provider]
      properties:
        step_id: { type: [string, "null"] }
        client_step_id: { type: [string, "null"] }
        intent_type: { type: string }
        capability: { type: string }
        target: { type: string }
        risk_level: { type: string }
        provider: { type: string }
        metadata: { type: object, additionalProperties: true, default: {} }

    Decision:
      type: object
      additionalProperties: false
      required: [decision_id, effect, rationale, applied_policies, permit_constraints, required_approvers]
      properties:
        decision_id: { type: string }
        effect: { $ref: "#/components/schemas/DecisionEffect" }
        rationale: { type: string }
        applied_policies:
          type: array
          items: { type: string }
        permit_constraints: { type: object, additionalProperties: true }
        required_approvers:
          type: array
          items: { type: string }

    Step:
      type: object
      additionalProperties: false
      required: [step_id, run_id, status, intent, decision, created_at]
      properties:
        step_id: { type: string }
        run_id: { type: string }
        status: { $ref: "#/components/schemas/StepStatus" }
        intent: { $ref: "#/components/schemas/StepIntent" }
        decision: { $ref: "#/components/schemas/Decision" }
        permit:
          anyOf:
            - { $ref: "#/components/schemas/ExecutionPermit" }
            - { type: "null" }
        approval_id: { type: [string, "null"] }
        created_at: { type: string, format: date-time }
        updated_at: { type: [string, "null"], format: date-time }

    Approval:
      type: object
      additionalProperties: false
      required: [approval_id, run_id, step_id, status, required_approvers, reason, created_at]
      properties:
        approval_id: { type: string }
        run_id: { type: string }
        step_id: { type: string }
        status: { $ref: "#/components/schemas/ApprovalStatus" }
        required_approvers:
          type: array
          items: { type: string }
        reason: { type: string }
        created_at: { type: string, format: date-time }
        decided_at: { type: [string, "null"], format: date-time }
        decided_by: { type: [string, "null"] }

    ApprovalActionRequest:
      type: object
      additionalProperties: false
      required: [actor]
      properties:
        actor: { type: string }
        reason: { type: [string, "null"] }

    ExecutionPermit:
      type: object
      additionalProperties: false
      required: [permit_id, run_id, step_id, issuer, constraints, issued_at, expires_at]
      properties:
        permit_id: { type: string }
        run_id: { type: string }
        step_id: { type: string }
        issuer: { type: string }
        constraints: { type: object, additionalProperties: true }
        issued_at: { type: string, format: date-time }
        expires_at: { type: string, format: date-time }

    StepResultSubmission:
      type: object
      additionalProperties: false
      required: [step_id, execution_result]
      properties:
        step_id: { type: string }
        execution_result: { type: string }
        artifacts: { type: object, additionalProperties: true, default: {} }
        error: { type: [string, "null"] }
        executor_metadata: { type: object, additionalProperties: true, default: {} }

    StepResultResponse:
      type: object
      additionalProperties: false
      required: [step_status, run_status]
      properties:
        step_status: { $ref: "#/components/schemas/StepStatus" }
        run_status: { $ref: "#/components/schemas/RunStatus" }

    AuditEvent:
      type: object
      additionalProperties: false
      required:
        [event_id, event_type, run_id, actor, timestamp, payload_hash, prev_hash, hash, policy_refs]
      properties:
        event_id: { type: string }
        event_type: { type: string }
        run_id: { type: string }
        step_id: { type: [string, "null"] }
        approval_id: { type: [string, "null"] }
        actor: { type: string }
        timestamp: { type: string, format: date-time }
        payload_hash: { type: string }
        prev_hash: { type: string }
        hash: { type: string }
        rationale: { type: [string, "null"] }
        policy_refs:
          type: array
          items: { type: string }

    AuditRunEventsResponse:
      type: object
      additionalProperties: false
      required: [run_id, events]
      properties:
        run_id: { type: string }
        events:
          type: array
          items: { $ref: "#/components/schemas/AuditEvent" }

    RunStatus:
      type: string
      enum:
        - accepted
        - planning
        - waiting_for_approval
        - ready
        - running
        - blocked
        - succeeded
        - failed
        - cancelled

    StepStatus:
      type: string
      enum:
        - declared
        - evaluating
        - approval_required
        - permitted
        - executing
        - completed
        - rejected
        - failed
        - cancelled

    DecisionEffect:
      type: string
      enum: [allow, deny, require_approval]

    ApprovalStatus:
      type: string
      enum: [requested, granted, denied, cancelled]

    Error:
      type: object
      additionalProperties: false
      required: [error]
      properties:
        error:
          type: object
          additionalProperties: false
          required: [code, message]
          properties:
            code: { type: string }
            message: { type: string }
            details:
              description: Optional structured diagnostics
